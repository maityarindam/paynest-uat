<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayNest | Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

    <div class="forgot-page">

        <div class="forgot-card">

            <a href="index.html" class="back-link">
                ← Back to Login
            </a>

            <div class="company-section">

                <img
                    src="assets/logos/abc-logo.svg"
                    alt="ABC Ltd"
                    class="company-logo">

                <h2>ABC Ltd.</h2>

                <p class="portal-title">
                    Payroll Administration Portal
                </p>

                <div class="title-divider"></div>

            </div>

            <div class="forgot-header">

                <div class="lock-icon-large">
                    🔐
                </div>

                <h3>
                    Forgot Password?
                </h3>

                <p class="forgot-description">
                    Enter your username and registered email address.
                    A password reset link will be sent to your email.
                </p>

            </div>

            <div class="input-group">

                <label>Username</label>

                <div class="input-wrapper">

                    <img
                        src="assets/icons/user.svg"
                        alt="User">

                    <input
                        type="text"
                        id="forgotUsername"
                        placeholder="Enter your username">

                </div>

            </div>

            <div class="input-group">

                <label>Registered Email</label>

                <div class="input-wrapper">

                    <img
                        src="assets/icons/mail.svg"
                        alt="Mail">

                    <input
                        type="email"
                        id="forgotEmail"
                        placeholder="Enter your registered email">

                </div>

            </div>

            <button
                type="button"
                class="sign-in-btn"
                onclick="sendResetLink()">

                <span>Send Reset Link</span>

                <span class="arrow">
                    →
                </span>

            </button>

            <div class="footer-branding">

                <p class="powered-text">
                    Powered by
                </p>

                <div class="brand-row">

                    <img
                        src="assets/logos/paynest-logo.svg"
                        alt="PayNest"
                        class="footer-logo">

                    <span class="footer-divider">
                        |
                    </span>

                    <span class="footer-tagline">
                        Nest Your Workforce
                    </span>

                </div>

                <p class="copyright">
                    © 2026 PayNest Technologies.
                    All rights reserved.
                </p>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
